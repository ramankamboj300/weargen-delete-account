<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Account Request</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    h2 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #ff4d4f;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #d9363e;
    }

    .success {
      color: green;
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Delete Account</h2>
  <p>Enter your registered email to request account deletion.</p>

  <input type="email" id="email" placeholder="Enter your email" />
  <button onclick="submitRequest()">Delete My Account</button>

  <div id="msg"></div>

  <div class="footer">
    Your account will be deleted within 7 days.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabase = window.supabase.createClient(
    "https://ksbbhpggrrpwfbutqlsa.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzYmJocGdncnJwd2ZidXRxbHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTIwNTcsImV4cCI6MjA5MjYyODA1N30.ZYRB6PerytyVLIKtdVQJHxH4RtczdQz-0pddqldGFNk"
  );

  async function submitRequest() {
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    msg.innerHTML = "";

    if (!email) {
      msg.innerHTML = "<div class='error'>Please enter your email</div>";
      return;
    }

    try {
      const { error } = await supabase
        .from("delete_requests")
        .insert([{ email: email }]);

      if (error) {
        if (error.message.includes("duplicate")) {
          msg.innerHTML = "<div class='error'>Request already submitted</div>";
        } else {
          msg.innerHTML = "<div class='error'>" + error.message + "</div>";
        }
      } else {
        msg.innerHTML = "<div class='success'>Request submitted successfully</div>";
      }
    } catch (err) {
      msg.innerHTML = "<div class='error'>Something went wrong</div>";
    }
  }
</script>

</body>
</html>
