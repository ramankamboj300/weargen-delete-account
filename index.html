<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg { margin-top: 10px; }
  </style>
</head>

<body>

<div class="container">
  <h2>Delete Account</h2>

  <input type="email" id="email" placeholder="Enter your email" />
  <button id="btn">Delete Account</button>

  <div id="msg" class="msg"></div>
</div>

<!-- ✅ IMPORTANT: correct CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ✅ FIX: correct import
  const { createClient } = supabase;

  const client = createClient(
    "https://ksbbhpggrrpwfbutqlsa.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzYmJocGdncnJwd2ZidXRxbHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTIwNTcsImV4cCI6MjA5MjYyODA1N30.ZYRB6PerytyVLIKtdVQJHxH4RtczdQz-0pddqldGFNk"
  );

  document.getElementById("btn").addEventListener("click", submitRequest);

  async function submitRequest() {
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    msg.innerHTML = "";

    if (!email) {
      msg.innerHTML = "Please enter email";
      return;
    }

    // check user exists
    const { data: user } = await client
      .from("users")
      .select("email")
      .eq("email", email)
      .maybeSingle();

    if (!user) {
      msg.innerHTML = "If this email exists, request submitted";
      return;
    }

    // insert request
    const { error } = await client
      .from("delete_requests")
      .insert([{ email }]);

    if (error) {
      msg.innerHTML = "Already requested or error";
    } else {
msg.innerHTML = "<div class='success'>Request submitted successfully. Your account will be permanently deleted within 7 days.</div>";
          }
  }
</script>

</body>
</html>
