<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg { margin-top: 10px; }
  </style>
</head>

<body>

<div class="container">
  <h2>Delete Account</h2>

  <input type="email" id="email" placeholder="Enter your email" />
  <button id="btn">Delete Account</button>

  <div id="msg" class="msg"></div>
</div>

<!-- ✅ IMPORTANT: correct CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ✅ FIX: correct import
  const { createClient } = supabase;

  const client = createClient(
    "https://ksbbhpggrrpwfbutqlsa.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzYmJocGdncnJwd2ZidXRxbHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTIwNTcsImV4cCI6MjA5MjYyODA1N30.ZYRB6PerytyVLIKtdVQJHxH4RtczdQz-0pddqldGFNk"
  );

  document.getElementById("btn").addEventListener("click", submitRequest);

 
  async function submitRequest() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");
  const btn = document.getElementById("btn");

  msg.innerHTML = "";

  if (!email) {
    msg.innerHTML = "<div class='error'>Please enter your email</div>";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Processing...";

  try {
    // check if email exists
    const { data: user } = await client
      .from("users")
      .select("email")
      .eq("email", email)
      .maybeSingle();

    if (user) {
      // only insert if exists
      await client
        .from("delete_requests")
        .insert([{ email }]);
    }

    // SAME message for both cases
    msg.innerHTML = `
      <div class='success'>
        If this email is registered, your deletion request has been received.
        Your account will be permanently deleted within 7 days.
      </div>
    `;

  } catch (err) {
    msg.innerHTML = "<div class='error'>Something went wrong</div>";
  }

  btn.disabled = false;
  btn.innerText = "Delete My Account";
}
</script>

</body>
</html>
